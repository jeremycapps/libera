$schema: https://json-schema.org/draft/2020-12/schema
$title: Libera Vocabulary
$type: object
required:
  - libera
  - types
  - fields
properties:
  libera:
    type: object
    required:
      - version
      - path
    properties:
      version:
        type: string
      path:
        type: string
        const: "{type}/{id}/{field}"
    additionalProperties: false
  types:
    type: array
    minItems: 1
    items:
      type: string
  fields:
    type: array
    minItems: 1
    items:
      type: string
additionalProperties: false
