$schema: https://json-schema.org/draft/2020-12/schema
title: Libera Workstream
type: object
required:
  - workstream
  - states
properties:
  workstream:
    type: object
    required:
      - id
      - libera_version
    properties:
      id:
        type: string
        pattern: "^[a-z0-9_.-]+$"
      libera_version:
        type: string
        const: 1.0.0
    additionalProperties: false
  states:
    type: object
    minProperties: 1
    patternProperties:
      "^((request|deliverable|task|change|issue|incident)/[a-z0-9_.-]+/(status|owner|result|priority|due)|(approval|acceptance|review|decision|validation|escalation)/[a-z0-9_.-]+/(status|owner|result|evidence|authority))$":
        type: object
        oneOf:
          - required: [values]
          - required: [value_type]
        properties:
          values:
            type: array
            minItems: 1
            items:
              type: string
          value_type:
            type: string
            enum:
              - string
              - date
              - actor_ref
              - reference
              - number
              - boolean
        additionalProperties: false
    additionalProperties: false
additionalProperties: false
