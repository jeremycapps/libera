$schema: https://json-schema.org/draft/2020-12/schema
$title: Libera Workstream
$type: object
required:
  - workstream
  - states
properties:
  workstream:
    type: object
    required:
      - id
      - libera_version
    properties:
      id:
        type: string
      libera_version:
        type: string
    additionalProperties: false
  states:
    type: object
    patternProperties:
      "^[a-z0-9_.-]+/[a-z0-9_.-]+/[a-z0-9_.-]+$":
        type: object
        oneOf:
          - required: [values]
          - required: [value_type]
        properties:
          values:
            type: array
            minItems: 1
            items:
              type: string
          value_type:
            type: string
            enum: [string, date, actor_ref, reference, number, boolean]
        additionalProperties: false
    additionalProperties: false
additionalProperties: false
